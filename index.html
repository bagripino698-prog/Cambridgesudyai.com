<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cambridge Practice AI</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {}
  }
  </script>
</head>
<body>
  <main id="app">
    <section class="card" id="placement">
      <h1>Cambridge Practice AI</h1>
      <p class="muted">Get a quick placement, then generate a custom quiz (10–50 questions).</p>
      <label>
        Tell me about your level / recent scores (optional):
        <input id="userHint" placeholder="e.g. got 160 in Cambridge B2 mock, struggle with listening" />
      </label>
      <div class="row">
        <button id="getPlacement">Get my Cambridge level</button>
        <select id="qCount" aria-label="Number of questions">
          <option value="10">10 questions</option>
          <option value="20">20 questions</option>
          <option value="30">30 questions</option>
          <option value="40">40 questions</option>
          <option value="50">50 questions</option>
        </select>
        <button id="genQuiz" disabled>Create quiz</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="card hidden" id="quizCard">
      <div class="topbar">
        <div id="detectedLevel">Level: —</div>
        <div id="progress">0 / 0</div>
      </div>
      <div id="questionArea"></div>
      <div class="row" id="controls">
        <button id="prev" disabled>Prev</button>
        <button id="next" disabled>Next</button>
        <button id="submitQuiz" disabled>Submit</button>
      </div>
      <div id="results" class="hidden"></div>
      <button id="back" class="secondary">Back</button>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
